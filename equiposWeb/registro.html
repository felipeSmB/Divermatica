<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCHORA — Registro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }
        .login-logo {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--cyan);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .login-subtitulo {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 36px;
        }
        .login-campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }
        .login-campo label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .login-campo input {
            background: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color var(--t-fast);
        }
        .login-campo input:focus {
            border-color: var(--border-focus);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue-mid), var(--cyan));
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.5px;
            transition: opacity var(--t-fast);
        }
        .btn-login:hover { opacity: 0.88; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        #mensajeRegistro {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            min-height: 20px;
        }
        .login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .login-link a {
            color: var(--cyan);
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover { text-decoration: underline; }
        .hint-campo {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">MATCHORA</div>
            <p class="login-subtitulo">Crea tu cuenta para comenzar</p>

            <div class="login-campo">
                <label>Usuario</label>
                <input type="text" id="regUser" placeholder="mínimo 3 caracteres" autocomplete="username">
                <span class="hint-campo">Solo letras, números y guión bajo</span>
            </div>
            <div class="login-campo">
                <label>Contraseña</label>
                <input type="password" id="regPass" placeholder="mínimo 8 caracteres" autocomplete="new-password">
            </div>
            <div class="login-campo">
                <label>Confirmar Contraseña</label>
                <input type="password" id="regConfirmar" placeholder="repite la contraseña" autocomplete="new-password">
            </div>

            <button class="btn-login" id="btnRegistro" onclick="hacerRegistro()">Crear Cuenta</button>
            <p id="mensajeRegistro"></p>

            <div class="login-link">
                ¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = './api';

        // Si ya tiene sesión activa, redirigir
        (function() {
            const token = localStorage.getItem('matchora_token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (Date.now() / 1000 < payload.exp) {
                        window.location.href = 'index.html';
                    }
                } catch {}
            }
        })();

        document.getElementById('regPass').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('regConfirmar').focus();
        });
        document.getElementById('regConfirmar').addEventListener('keydown', e => {
            if (e.key === 'Enter') hacerRegistro();
        });

        async function hacerRegistro() {
            const username   = document.getElementById('regUser').value.trim();
            const password   = document.getElementById('regPass').value;
            const confirmar  = document.getElementById('regConfirmar').value;
            const btn        = document.getElementById('btnRegistro');
            const msg        = document.getElementById('mensajeRegistro');

            if (!username || !password || !confirmar) {
                msg.style.color = '#ff4d6d';
                msg.textContent = '⚠️ Complete todos los campos';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Creando cuenta...';
            msg.textContent = '';

            try {
                const res  = await fetch(`${API_URL}/registro.php`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, password, confirmar }),
                });
                const text = await res.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = { erro: 'Respuesta inválida del servidor' };
                }

                if (res.ok && data.ok) {
                    msg.style.color = '#00e676';
                    msg.textContent = '✅ Cuenta creada. Redirigiendo...';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    const erros = Array.isArray(data.erro) ? data.erro.join(' / ') : data.erro;
                    msg.style.color = '#ff4d6d';
                    msg.textContent = '❌ ' + erros;
                    btn.disabled    = false;
                    btn.textContent = 'Crear Cuenta';
                }
            } catch {
                msg.style.color = '#ff4d6d';
                msg.textContent = '❌ Error de conexión con el servidor';
                btn.disabled    = false;
                btn.textContent = 'Crear Cuenta';
            }
        }
    </script>
</body>
</html>
