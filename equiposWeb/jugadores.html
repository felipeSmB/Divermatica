<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUIPOS - Jugadores</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">EQUIPOS</div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="jugadores.html" class="activo">Jugadores</a></li>
            <li><a href="deportes.html">Deportes</a></li>
            <li><a href="equipos.html">Generar Equipos</a></li>
        </ul>
    </nav>

    <main class="contenido">
        <h2 class="modulo-titulo">Gestión de Jugadores</h2>

        <div class="barra-busqueda">
            <input type="text" id="txtBuscar" placeholder="Buscar jugador...">
            <button onclick="buscarJugador()">Buscar</button>
            <button onclick="mostrarTodos()">↺ Todos</button>
        </div>

        <div class="tabla-contenedor">
            <table id="tablaJugadores">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>Posición</th>
                        <th>Nivel</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr><td colspan="7" class="sin-datos">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

´        <div class="formulario-panel">
            <h3>Datos del Jugador</h3>
            <input type="hidden" id="jugadorId">
            <div class="form-grid">
                <div class="form-grupo">
                    <label>Nombre *</label>
                    <input type="text" id="fNombre" placeholder="Nombre completo">
                </div>
                <div class="form-grupo">
                    <label>Teléfono</label>
                    <input type="text" id="fTelefono" placeholder="Teléfono">
                </div>
                <div class="form-grupo">
                    <label>Correo</label>
                    <input type="email" id="fMail" placeholder="correo@ejemplo.com">
                </div>
                <div class="form-grupo">
                    <label>Posición</label>
                    <select id="fPosicion">
                        <option value="">— Seleccionar —</option>
                        <option>Portero</option>
                        <option>Defensa</option>
                        <option>Lateral</option>
                        <option>Mediocampista</option>
                        <option>Delantero</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label>Nivel *</label>
                    <select id="fNivel">
                        <option value="">— Seleccionar —</option>
                        <option>Medio</option>
                        <option>Bueno</option>
                        <option>Muy Bueno</option>
                    </select>
                </div>
            </div>
            <div class="form-botones">
                <button class="btn-primario"   onclick="guardarJugador()">Guardar</button>
                <button class="btn-secundario" onclick="limpiarFormulario()">Limpiar</button>
            </div>
            <p id="mensajeEstado" class="mensaje-estado"></p>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/jugadores.js"></script>
    <script>cargarJugadores();</script>
</body>
</html>
