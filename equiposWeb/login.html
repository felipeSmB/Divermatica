<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCHORA — Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }
        .login-logo {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--cyan);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .login-subtitulo {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 36px;
        }
        .login-campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }
        .login-campo label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .login-campo input {
            background: var(--bg-surface);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color var(--t-fast);
        }
        .login-campo input:focus {
            border-color: var(--border-focus);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue-mid), var(--cyan));
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.5px;
            transition: opacity var(--t-fast);
        }
        .btn-login:hover { opacity: 0.88; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        #mensajeLogin {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">MATCHORA</div>
            <p class="login-subtitulo">Ingrese sus credenciales para continuar</p>

            <div class="login-campo">
                <label>Usuario</label>
                <input type="text" id="loginUser" placeholder="Usuario" autocomplete="username">
            </div>
            <div class="login-campo">
                <label>Contraseña</label>
                <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn-login" id="btnLogin" onclick="hacerLogin()">Iniciar Sesión</button>
            <p id="mensajeLogin"></p>

            <div class="login-link">
                ¿No tienes cuenta? <a href="registro.html">Regístrate</a>
            </div>

        </div>
    </div>

    <script>
        const API_URL = 'https://deviancy-bulldozer-concave.ngrok-free.dev/equiposWeb/api';

        (function() {
            const token = localStorage.getItem('matchora_token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (Date.now() / 1000 < payload.exp) {
                        window.location.href = 'index.html';
                    }
                } catch {}
            }
        })();

        document.getElementById('loginUser').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('loginPass').focus();
        });
        document.getElementById('loginPass').addEventListener('keydown', e => {
            if (e.key === 'Enter') hacerLogin();
        });

        async function hacerLogin() {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;
            const btn      = document.getElementById('btnLogin');
            const msg      = document.getElementById('mensajeLogin');

            if (!username || !password) {
                msg.style.color = '#ff4d6d';
                msg.textContent = '⚠️ Complete todos los campos';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Verificando...';
            msg.textContent = '';

            try {
                const res  = await apiFetch(`${API_URL}/auth.php`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username, password }),
                });
                const text = await res.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    data = { erro: 'Respuesta inválida del servidor' };
                }

                if (res.ok && data.token) {
                    localStorage.setItem('matchora_token', data.token);
                    window.location.href = 'index.html';
                } else {
                    msg.style.color = '#ff4d6d';
                    msg.textContent = '❌ ' + (data.erro || 'Credenciales inválidas');
                    btn.disabled    = false;
                    btn.textContent = 'Iniciar Sesión';
                }
            } catch {
                msg.style.color = '#ff4d6d';
                msg.textContent = '❌ Error de conexión con el servidor';
                btn.disabled    = false;
                btn.textContent = 'Iniciar Sesión';
            }
        }
    </script>
</body>
</html>
