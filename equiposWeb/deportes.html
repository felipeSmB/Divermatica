<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATCHORA - Deportes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">MATCHORA</div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="jugadores.html">Jugadores</a></li>
            <li><a href="deportes.html" class="activo">Deportes</a></li>
            <li><a href="equipos.html">Generar Equipos</a></li>
        </ul>
    </nav>

    <main class="contenido">
        <h2 class="modulo-titulo">Gestión de Deportes</h2>

        <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
            <button class="btn-primario" onclick="abrirModalDeporte()">+ Nuevo Deporte</button>
        </div>


        <div class="tabla-contenedor">
            <table id="tablaDeportes">
                <thead>
                    <tr>
                        <th>ID</th><th>Deporte</th>
                        <th>Jugadores por Equipo</th><th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaDeportes">
                    <tr><td colspan="4" class="sin-datos">Cargando...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- MODAL DEPORTE -->
<div class="modal-overlay" id="modalDeporte">
    <div class="modal">
        <div class="modal-titulo">
            <span id="modalDeporteTitulo">Nuevo Deporte</span>
            <button class="modal-fechar" onclick="cerrarModalDeporte()">✕</button>
        </div>
        <input type="hidden" id="deporteId">
        <div class="form-grid">
            <div class="form-grupo">
                <label>Nombre *</label>
                <input type="text" id="dNombre" placeholder="Ej: Fútbol 7">
            </div>
            <div class="form-grupo">
                <label>Jugadores por equipo *</label>
                <div style="display:flex;align-items:center;gap:10px;">
                    <button type="button" onclick="alterarNum(-1)" style="flex-shrink:0">−</button>
                    <span id="dNumDisplay" style="font-size:16px;font-weight:bold;min-width:28px;text-align:center;color:var(--text-primary)">7</span>
                    <button type="button" onclick="alterarNum(1)" style="flex-shrink:0">+</button>
                    <input type="hidden" id="dNumJugadores" value="7">
                </div>
            </div>
        </div>
        <p id="mensajeDeporte" class="mensaje-estado"></p>
        <div class="modal-botones">
            <button class="btn-secundario" onclick="cerrarModalDeporte()">Cancelar</button>
            <button class="btn-primario" onclick="guardarDeporte()">💾 Guardar</button>
        </div>
    </div>
</div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/deportes.js"></script>
    <script>cargarDeportes();</script>
</body>
</html>
